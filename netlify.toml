# Netlify deploy settings for Saleem Rishah
# On every deploy: run build-work.js (collects content/ into data/work.json) then publish.

[build]
  command = "node build-work.js"
  publish = "."

[build.environment]
  NODE_VERSION = "20"

# Admin panel needs this for Netlify Identity login
[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
