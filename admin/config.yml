# ============================================================
# Saleem Rishah CMS — Decap config
# All fields shown in the admin panel are defined here.
# The CMS writes into the content/ folder automatically.
# ============================================================

backend:
  name: github
  repo: saleemrishah/saleemrishah
  branch: main
  base_url: https://www.saleemrishah.com
  auth_endpoint: api/auth

# Image upload folder used by the CMS
media_folder: "assets/uploads"
public_folder: "assets/uploads"

# Admin UI language
locale: "en"

# Publish mode
publish_mode: editorial_workflow

# Local backend: use npx decap-server on localhost (no deploy needed)
local_backend: true

collections:
  # ---- Section Visuals (feature card per section) ----
  - name: "section_visuals"
    label: "Section Feature Cards"
    delete: false
    editor:
      preview: false
    files:
      - name: "section_visual_ai"
        label: "AI & Generative — Feature Card"
        file: "content/site/section-visual-ai.json"
        fields:
          - { name: "feature_image", label: "Feature card image (square design)", widget: "image", required: false, hint: "Square image recommended (1:1). Appears as the first visual card in the AI section grid." }
      - name: "section_visual_motion"
        label: "Motion & Video — Feature Card"
        file: "content/site/section-visual-motion.json"
        fields:
          - { name: "feature_image", label: "Feature card image (square design)", widget: "image", required: false, hint: "Square image recommended. Appears as the first card in the Motion section." }
      - name: "section_visual_brand"
        label: "Brand & Social — Feature Card"
        file: "content/site/section-visual-brand.json"
        fields:
          - { name: "feature_image", label: "Feature card image (square design)", widget: "image", required: false, hint: "Square image recommended. Appears as the first card in the Brand section." }
      - name: "section_visual_football"
        label: "Football / Arabic — Feature Card"
        file: "content/site/section-visual-football.json"
        fields:
          - { name: "feature_image", label: "Feature card image (square design)", widget: "image", required: false, hint: "Square image recommended. Appears as the first card in the Football section." }

  # ---- Section: Identity (logo + favicon) ----
  - name: "identity"
    label: "Identity / Logo"
    delete: false
    editor:
      preview: false
    files:
      - name: "branding"
        label: "Logo & Favicon"
        file: "content/site/branding.json"
        fields:
          - { name: "logo_image", label: "Logo (wordmark, top left, optional)", widget: "image", required: false, hint: "Transparent PNG/SVG. Leave empty = text 'Saleem Rishah'." }
          - { name: "logo_text", label: "Logo text (if no image)", widget: "string", required: false, default: "Saleem Rishah" }
          - { name: "logo_height", label: "Logo height in pixels (e.g. 40)", widget: "number", required: false, default: 40, hint: "Bigger number = bigger logo. Only applies to image logo." }
          - { name: "favicon", label: "Favicon (browser tab icon, optional)", widget: "image", required: false, hint: "Square, PNG/SVG. Leave empty = current SR icon." }

  # ---- Section: Homepage ----
  - name: "home"
    label: "Homepage"
    delete: false
    editor:
      preview: false
    files:
      - name: "hero"
        label: "Hero (top of homepage)"
        file: "content/site/home.json"
        fields:
          - { name: "portrait", label: "Personal photo (portrait)", widget: "image", required: false, hint: "Square recommended. Leave empty = current photo." }
          - { name: "eyebrow_de", label: "Eyebrow / small title (German)", widget: "string", required: false, default: "Media Design Specialist & AI Creative" }
          - { name: "eyebrow_en", label: "Eyebrow / small title (English)", widget: "string", required: false, default: "Media Design Specialist & AI Creative" }
          - { name: "headline_de", label: "Main headline (German)", widget: "text", required: false, hint: "HTML allowed, e.g. <br> for a line break." }
          - { name: "headline_en", label: "Main headline (English)", widget: "text", required: false }
          - { name: "lead_de", label: "Intro text (German)", widget: "text", required: false }
          - { name: "lead_en", label: "Intro text (English)", widget: "text", required: false }
          - { name: "status_de", label: "Status badge (German)", widget: "string", required: false, default: "Offen für neue Projekte & Positionen" }
          - { name: "status_en", label: "Status badge (English)", widget: "string", required: false, default: "Open to new projects & opportunities" }

  # ---- Section: AI & Generative ----
  - name: "ai"
    label: "AI & Generative"
    label_singular: "AI project"
    folder: "content/ai"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    summary: "{{title_de}}"
    fields:
      - { name: "order", label: "Order (number, smaller = first)", widget: "number", default: 10, required: false }
      - { name: "title_de", label: "Title (German)", widget: "string" }
      - { name: "title_en", label: "Title (English)", widget: "string" }
      - { name: "summary_de", label: "Short description (German)", widget: "text" }
      - { name: "summary_en", label: "Short description (English)", widget: "text" }
      - { name: "cover", label: "Cover image", widget: "image", required: false }
      - { name: "chips", label: "Tools / Tags", widget: "list", required: false, hint: "Tools, e.g. Premiere Pro, Midjourney" }
      - { name: "body_de", label: "Long text (German, optional)", widget: "text", required: false }
      - { name: "body_en", label: "Long text (English, optional)", widget: "text", required: false }
      - { name: "video", label: "Video link (YouTube embed or MP4, optional)", widget: "string", required: false, hint: "e.g. https://www.youtube.com/embed/VIDEO_ID" }
      - name: "aspect_ratio"
        label: "Media shape (aspect ratio)"
        widget: "select"
        required: false
        default: "16:9"
        options: ["16:9", "9:16", "4:3", "1:1", "wide", "auto"]
        hint: "16:9 = landscape video (default). 9:16 = portrait/vertical. wide = ultra-wide screenshot. auto = image keeps its natural shape."
      - name: "media_width"
        label: "Media width in detail view"
        widget: "select"
        required: false
        default: "full"
        options: ["full", "large", "medium", "small"]
        hint: "full = edge to edge (default). medium/small = centred with max-width."
      - name: "gallery"
        label: "More images (gallery)"
        widget: "list"
        required: false
        minimize_collapsed: false
        summary: "Image {{i}} — {{fields.aspect_ratio}}"
        fields:
          - { name: "image", label: "Image", widget: "image" }
          - name: "aspect_ratio"
            label: "Shape (aspect ratio)"
            widget: "select"
            required: false
            default: "auto"
            options: ["auto", "1:1", "4:3", "3:4", "16:9", "9:16", "wide"]
            hint: "auto = natural image shape (recommended for mixed content). wide = ultra-wide screenshot (no cropping)."
          - name: "size"
            label: "Width in grid"
            widget: "select"
            required: false
            default: "1"
            options: ["1", "2"]
            hint: "2 = takes double width. Good for landscape/panoramic images."
      - { name: "link_url", label: "External link — URL (optional)", widget: "string", required: false }
      - { name: "link_label", label: "External link — label (optional)", widget: "string", required: false }
      - name: "tracks"
        label: "Pipeline steps (optional, e.g. for Julia)"
        widget: "list"
        required: false
        fields:
          - { name: "id", label: "Step label", widget: "string", hint: "e.g. Track 01 · Concept" }
          - { name: "title_de", label: "Title (German)", widget: "string" }
          - { name: "title_en", label: "Title (English)", widget: "string" }
          - { name: "text_de", label: "Text (German)", widget: "text", required: false }
          - { name: "text_en", label: "Text (English)", widget: "text", required: false }
          - { name: "chips", label: "Tools / Tags", widget: "list", required: false }

